services:
  # MySQL服务
  mysql:
    image: mysql:8.0
    container_name: fleets-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fleets
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone='+8:00'
    networks:
      - fleets_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Redis服务
  redis:
    image: redis:7.0-alpine
    container_name: fleets-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ""
    networks:
      - fleets_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MongoDB服务
  mongodb:
    image: mongo:5.0
    container_name: fleets-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root123
      MONGO_INITDB_DATABASE: fleets
      TZ: Asia/Shanghai
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongodb:/docker-entrypoint-initdb.d
    networks:
      - fleets_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/fleets --quiet
      interval: 10s
      timeout: 5s
      retries: 3

  # RocketMQ NameServer（4.9.7 对 Docker 支持更好，避免 4.9.4 常见启动/路径问题）
  rocketmq-namesrv:
    image: apache/rocketmq:4.9.7
    container_name: fleets-rocketmq-namesrv
    restart: always
    ports:
      - "9876:9876"
    volumes:
      - rocketmq_namesrv_logs:/root/rocketmq/logs
    environment:
      JAVA_OPT_EXT: "-Xms512m -Xmx512m"
    command: sh mqnamesrv
    networks:
      - fleets_network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9876 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # RocketMQ Broker（与 NameServer 同版本 4.9.7，兼容 4.9.4 客户端）
  rocketmq-broker:
    image: apache/rocketmq:4.9.7
    container_name: fleets-rocketmq-broker
    restart: always
    ports:
      - "10909:10909"
      - "10911:10911"
    volumes:
      - rocketmq_broker_logs:/root/rocketmq/logs
      - rocketmq_broker_store:/root/rocketmq/store
      # 镜像默认以 rocketmq 用户运行，挂到 /root 下会无权限读取；挂到 ROCKETMQ_HOME/conf 下即可
      - ./rocketmq/broker.conf:/home/rocketmq/rocketmq-4.9.7/conf/broker.conf
    environment:
      NAMESRV_ADDR: "rocketmq-namesrv:9876"
      JAVA_OPT_EXT: "-Xms1g -Xmx1g -XX:+UseG1GC"
      # 方案 A：让 Broker 注册成 127.0.0.1:10911（宿主机本地集成测试可直连）
      BROKER_IP: "127.0.0.1"
    command: ["sh", "mqbroker", "-n", "rocketmq-namesrv:9876", "-c", "/home/rocketmq/rocketmq-4.9.7/conf/broker.conf"]
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    networks:
      - fleets_network
    # 给容器分配足够内存，避免 OOM 导致 3 秒内被系统杀进程（docker compose up 下生效）
    mem_limit: 2g
    mem_reservation: 1g
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 10911 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # RocketMQ Dashboard (Web管理界面)
  # 使用 styletang 维护的镜像，更稳定且易于拉取
  rocketmq-dashboard:
    image: styletang/rocketmq-console-ng:latest
    container_name: fleets-rocketmq-dashboard
    restart: always
    ports:
      - "8088:8080"
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876 -Dcom.rocketmq.sendMessageWithVIPChannel=false"
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    networks:
      - fleets_network

  # OpenResty 网关 - 暂时注释，开发阶段直接访问应用
  # 取消注释时需要修正volume路径为: ../openresty/conf/nginx.conf
  # openresty:
  #   image: openresty/openresty:1.21.4.1-alpine
  #   container_name: fleets-openresty
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "9001:9001"
  #   volumes:
  #     - ../openresty/conf/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
  #     - ../openresty/lua:/usr/local/openresty/nginx/lua:ro
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - fleets_network

networks:
  fleets_network:
    driver: bridge
    name: fleets_network

volumes:
  mysql_data:
    name: fleets_mysql_data
  redis_data:
    name: fleets_redis_data
  mongodb_data:
    name: fleets_mongodb_data
  rocketmq_namesrv_logs:
    name: fleets_rocketmq_namesrv_logs
  rocketmq_broker_logs:
    name: fleets_rocketmq_broker_logs
  rocketmq_broker_store:
    name: fleets_rocketmq_broker_store
