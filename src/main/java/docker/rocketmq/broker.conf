# 集群名称
brokerClusterName=DefaultCluster
# broker名称
brokerName=broker-a
# broker ID，0表示Master，大于0表示Slave
brokerId=0
# 删除过期文件的时间点，默认凌晨4点
deleteWhen=04
# 文件保留时间，默认48小时
fileReservedTime=48
# broker角色
brokerRole=ASYNC_MASTER
# 刷盘策略
flushDiskType=ASYNC_FLUSH
# broker 对外通告地址（注册到 NameServer 并下发给客户端的 BrokerAddr）
# 方案 A：宿主机本地 JVM 跑集成测试时，要求此地址必须是宿主机可直连的地址
brokerIP1=127.0.0.1
# 自动创建 Topic
autoCreateTopicEnable=true
